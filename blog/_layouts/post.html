<!DOCTYPE HTML>
<html>
  <head>
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
  </head>
  <body class="is-preload">
    <div id="wrapper">
      <!-- Header (identique à home.html) -->
      <header id="header">
        <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
        <nav class="links">
          <ul>
            <li><a href="https://jenc-dev.github.io/">Accueil</a></li>
          </ul>
        </nav>
        <nav class="main">
          <!-- Menu (identique à home.html) -->
        </nav>
      </header>

      <!-- Main : Contenu de l'article -->
      <div id="main">
        <article class="post">
          <header>
            <div class="title">
              <h1>{{ page.title }}</h1>
              <p>{{ page.excerpt }}</p>
            </div>
            <div class="meta">
              <time class="published">{{ page.date | date: "%B %d, %Y" }}</time>
              <a href="#" class="author"><span class="name">Jennifer Charvolin</span><img src="{{ site.baseurl }}/images/Profile.png" alt="" /></a>
            </div>
          </header>

          <!-- Contenu avec les classes CSS du template -->
          <div class="entry-content">
            <div class="post-content">
              {{ content }}
            </div>
          </div>

          <footer>
            <ul class="actions">
              <li><a href="{{ site.baseurl }}/" class="button large">Retour au blog</a></li>
            </ul>
          </footer>
        </article>
      </div>

      <!-- Sidebar (identique à home.html) -->
      <section id="sidebar">
        <!-- Ton code sidebar ici -->
      </section>
    </div>

    <!-- Scripts -->
    <script src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/browser.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/breakpoints.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/util.js"></script>
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
  </body>
</html>
